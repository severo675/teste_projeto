<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Estacionamento - Vagas 1 a 9</title>
    <style>
        :root {
            --livre: #2ecc71;
            --ocupada: #e74c3c;
            --selecionada: #3498db;
            --fundo: #f4f7f6;
            --texto: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--fundo);
            color: var(--texto);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 { margin-bottom: 20px; }

        /*CADASTRO*/
        .painel-cadastro {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
        }

        button {
            padding: 10px 20px;
            background-color: #34495e;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background-color: #2c3e50; }

        /*VAGAS*/
        .mapa-estacionamento {
            display: grid;
            grid-template-columns: repeat(3, 130px); /* 3 colunas organizadas */
            gap: 15px;
            background: #bdc3c7;
            padding: 20px;
            border-radius: 10px;
        }

        .vaga {
            height: 100px;
            background: #ecf0f1;
            border-left: 4px solid #7f8c8d;
            border-right: 4px solid #7f8c8d;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            font-size: 0.8rem;
        }

        .vaga:hover { transform: scale(1.05); }

        .vaga.livre { border-bottom: 2px dashed #bdc3c7; }

        .vaga.selecionada {
            background-color: var(--selecionada);
            color: white;
            border-color: #2980b9;
        }

        .vaga.ocupada {
            background-color: var(--ocupada);
            color: white;
            border-color: #c0392b;
        }

        .placa-vaga {
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 5px;
        }

        .info { margin-top: 20px; color: #7f8c8d; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1>Controle de Estacionamento</h1>

    <div class="painel-cadastro">
        <input type="text" id="modelo" list="marcas" placeholder="Modelo do Carro">
        <datalist id="marcas">
            <option value="Toyota">
            <option value="Honda">
            <option value="Ford">
            <option value="Chevrolet">
            <option value="Volkswagen">
            <option value="Fiat">
        </datalist>

        <input type="text" id="placa" placeholder="Placa">
        <button onclick="estacionar()">Selecionar vaga</button>
    </div>

    <div class="mapa-estacionamento" id="mapa">
        </div>

    <script>
        let vagaSelecionada = null; //VAGA SELECIONADA

        //BUSCAR VAGAS
        async function carregarVagas() {
            try {
                const response = await fetch('/veiculos');
                const veiculosOcupados = await response.json();
                
                const mapa = document.getElementById('mapa');
                mapa.innerHTML = ''; // Limpa o mapa

                for (let i = 1; i <= 9; i++) { //GERAR DE 1 A 15 VAGAS
                    const divVaga = document.createElement('div');
                    divVaga.className = 'vaga';
                    
                    const veiculo = veiculosOcupados.find(v => v.vaga === i); //VER SE A VAGA ESTÁ OCUPADA

                    if (veiculo) {
                        divVaga.classList.add('ocupada'); //VAGA OCUPADA
                        divVaga.innerHTML = `<span>VAGA ${i}</span><div class="placa-vaga">${veiculo.placa}</div>`;
                        divVaga.onclick = () => liberarVaga(i); //SAIDA
                    } else {
                        // Se a vaga estiver livre
                        divVaga.classList.add('livre'); //VAGA LIVRE
                        divVaga.innerHTML = `<span>VAGA ${i}</span><div class="placa-vaga">LIVRE</div>`;
                        
                        if (vagaSelecionada === i) {
                            divVaga.classList.add('selecionada');
                        }

                        divVaga.onclick = () => {
                            vagaSelecionada = i;
                            carregarVagas(); 
                        };
                    }
                    mapa.appendChild(divVaga);
                }
            } catch (error) {
                console.error("Erro ao carregar vagas:", error);
            }
        }

        async function estacionar() {
            const modelo = document.getElementById('modelo').value;
            const placa = document.getElementById('placa').value;

            if (!vagaSelecionada) return alert("Por favor, selecione uma vaga no mapa!");
            if (!modelo || !placa) return alert("Preencha modelo e placa!");

            //EMVIA OS DADOS
            const response = await fetch('/veiculos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ modelo, placa, vaga: vagaSelecionada })
            });

            if (response.ok) {
                alert("Veículo estacionado!");
                vagaSelecionada = null; //APAGA A SELEÇÃO
                document.getElementById('modelo').value = '';
                document.getElementById('placa').value = '';
                carregarVagas();
            } else {
                const erro = await response.json();
                alert("Erro: " + erro.erro);
            }
        }

        // REMOÇÃO
        async function liberarVaga(numeroVaga) {
            if (confirm(`Deseja liberar a vaga ${numeroVaga}?`)) {
                const response = await fetch(`/veiculos/${numeroVaga}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert("Vaga liberada com sucesso!");
                    carregarVagas();
                } else {
                    alert("Erro ao liberar vaga.");
                }
            }
        }

        window.onload = carregarVagas;
    </script>
</body>
</html>
