<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro Estacionamento</title>

<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
  }

  label {
    font-weight: 600;
  }

  input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
    transition: 0.3s;
  }

  input:focus, select:focus {
    border-color: #667eea;
    box-shadow: 0 0 5px #667eea;
    outline: none;
  }

  .btn-salvar {
    width: 100%;
    background: #764ba2;
    color: white;
    border: none;
    padding: 12px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 10px;
  }

  /* CORRIGIDO: de :houver para :hover */
  .btn-salvar:hover {
    background: #5c3782;
  }

  .erro { color: red; font-size: 13px; }
  .sucesso { color: green; font-size: 13px; }

</style>
</head>

<body>

<div class="container">
  <h2>Cadastro</h2>

  <label>Nome:</label>
  <input type="text" id="nome" placeholder="Digite seu nome">

  <label>Número:</label>
  <input type="text" id="telefone" placeholder="(00) 00000-0000" oninput="formatarTelefone(this)">

  <label>CPF:</label>
  <input type="text" id="cpf" placeholder="000.000.000-00" oninput="formatarCPF(this)" onblur="validarCPF()">
  <div id="msgCPF"></div>

  <label>Onde quer estacionar:</label>
  <select id="local" onchange="mostrarOpcoes()">
    <option value="">Selecione</option>
    <option value="derby">Derby</option>
    <option value="camaragibe">Camaragibe</option>
  </select>

  <label>Escolha a instituição:</label>
  <select id="instituicoes">
    <option value="">Escolha primeiro o local acima</option>
  </select>

  <button class="btn-salvar" onclick="salvarNoSupabase()">Salvar Cadastro</button>

</div>

<script>

// 🎯 FUNÇÃO ATUALIZADA E BLINDADA CONTRA TRAVAMENTOS
function salvarNoSupabase() {
  // Cria o objeto com os dados para mandar para o Node/Supabase
  const dados = {
    nome: document.getElementById('nome').value,
    cpf: document.getElementById('cpf').value,
    localidade: document.getElementById('instituicoes').value
  };

  // Envia os dados para o seu servidor em segundo plano
  fetch('http://localhost:3000/veiculos', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(dados)
  }).catch(error => console.error("Erro ao enviar para o servidor:", error));

  // INDEPENDENTE DE QUALQUER ERRO, ISSO VAI FORÇAR A TELA A IR PRO INDEX AGORA!
  window.location.href = "http://localhost:3000";
}

// 🎯 FORMATAÇÃO CPF
function formatarCPF(input) {
  let v = input.value.replace(/\D/g, '');

  v = v.replace(/(\d{3})(\d)/, "$1.$2");
  v = v.replace(/(\d{3})(\d)/, "$1.$2");
  v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");

  input.value = v;
}

// 🎯 FORMATAÇÃO TELEFONE
function formatarTelefone(input) {
  let v = input.value.replace(/\D/g, '');

  v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
  v = v.replace(/(\d{5})(\d)/, "$1-$2");

  input.value = v;
}

// ✅ VALIDAÇÃO CPF
function validarCPF() {
  let cpf = document.getElementById("cpf").value.replace(/\D/g, '');
  let msg = document.getElementById("msgCPF");

  if (!msg) return; // Proteção extra caso a div suma

  if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) {
    msg.innerHTML = "<span class='erro'>CPF inválido</span>";
    return;
  }

  let soma = 0, resto;

  for (let i = 1; i <= 9; i++)
    soma += parseInt(cpf.substring(i-1, i)) * (11 - i);

  resto = (soma * 10) % 11;
  if (resto == 10 || resto == 11) resto = 0;

  if (resto != cpf[9]) {
    msg.innerHTML = "<span class='erro'>CPF inválido</span>";
    return;
  }

  soma = 0;
  for (let i = 1; i <= 10; i++)
    soma += parseInt(cpf.substring(i-1, i)) * (12 - i);

  resto = (soma * 10) % 11;
  if (resto == 10 || resto == 11) resto = 0;

  if (resto != cpf[10]) {
    msg.innerHTML = "<span class='erro'>CPF inválido</span>";
    return;
  }

  msg.innerHTML = "<span class='sucesso'>CPF válido ✔</span>";
}

// 📍 LISTA DINÂMICA DE INSTITUIÇÕES
function mostrarOpcoes() {
  let local = document.getElementById("local").value;
  let select = document.getElementById("instituicoes");

  if (!select) return;

  select.innerHTML = "";

  if (local === "derby") {
    let opcoes = [
      "UNINASSAU, BLOCO A Derby",
      "UNINASSAU, BLOCO B Derby",
      "UNINASSAU, BLOCO C Derby",
      "UNINASSAU, BLOCO D Derby",
      "UNINASSAU, BLOCO E Derby",
      "Estácio Derby",
      "Wyden EAD Derby",
      "Colégio Apoio Derby",
      "Colégio Equipe",
      "Colégio da Polícia Militar"
    ];

    opcoes.forEach(op => {
      let option = document.createElement("option");
      option.text = op;
      option.value = op; // Adicionado value para enviar o texto correto no fetch
      select.add(option);
    });

  } else if (local === "camaragibe") {
    let opcoes = [
      "UNINASSAU Camaragibe",
      "Unopar Camaragibe",
      "Anhanguera Camaragibe",
      "Escola Técnica Alcides do Nascimento",
      "Escola Vale das Pedreiras",
      "Escola Abigail Bernardes"
    ];

    opcoes.forEach(op => {
      let option = document.createElement("option");
      option.text = op;
      option.value = op; // Adicionado value para enviar o texto correto no fetch
      select.add(option);
    });

  } else {
    let option = document.createElement("option");
    option.text = "Escolha primeiro o local acima";
    option.value = "";
    select.add(option);
  }
}

</script>

</body>
</html>
