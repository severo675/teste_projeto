<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro Estacionamento</title>

<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
  }

  label {
    font-weight: 600;
  }

  input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
    transition: 0.3s;
  }

  input:focus, select:focus {
    border-color: #667eea;
    box-shadow: 0 0 5px #667eea;
    outline: none;
  }

  .erro { color: red; font-size: 13px; }
  .sucesso { color: green; font-size: 13px; }

</style>
</head>

<body>

<div class="container">
  <h2>Cadastro</h2>

  <label>Nome:</label>
  <input type="text" placeholder="Digite seu nome">

  <label>Número:</label>
  <input type="text" id="telefone" placeholder="(00) 00000-0000" oninput="formatarTelefone(this)">

  <label>CPF:</label>
  <input type="text" id="cpf" placeholder="000.000.000-00" oninput="formatarCPF(this)" onblur="validarCPF()">
  <div id="msgCPF"></div>

  <label>Onde quer estacionar:</label>
  <select id="local" onchange="mostrarOpcoes()">
    <option value="">Selecione</option>
    <option value="derby">Derby</option>
    <option value="camaragibe">Camaragibe</option>
  </select>

  <label>Escolha a instituição:</label>
  <select id="instituicoes">
    <option>Escolha primeiro o local acima</option>
  </select>

</div>

<script>

// 🎯 FORMATAÇÃO CPF
function formatarCPF(input) {
  let v = input.value.replace(/\D/g, '');

  v = v.replace(/(\d{3})(\d)/, "$1.$2");
  v = v.replace(/(\d{3})(\d)/, "$1.$2");
  v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");

  input.value = v;
}

// 🎯 FORMATAÇÃO TELEFONE
function formatarTelefone(input) {
  let v = input.value.replace(/\D/g, '');

  v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
  v = v.replace(/(\d{5})(\d)/, "$1-$2");

  input.value = v;
}

// ✅ VALIDAÇÃO CPF
function validarCPF() {
  let cpf = document.getElementById("cpf").value.replace(/\D/g, '');
  let msg = document.getElementById("msgCPF");

  if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) {
    msg.innerHTML = "<span class='erro'>CPF inválido</span>";
    return;
  }

  let soma = 0, resto;

  for (let i = 1; i <= 9; i++)
    soma += parseInt(cpf.substring(i-1, i)) * (11 - i);

  resto = (soma * 10) % 11;
  if (resto == 10 || resto == 11) resto = 0;

  if (resto != cpf[9]) {
    msg.innerHTML = "<span class='erro'>CPF inválido</span>";
    return;
  }

  soma = 0;
  for (let i = 1; i <= 10; i++)
    soma += parseInt(cpf.substring(i-1, i)) * (12 - i);

  resto = (soma * 10) % 11;
  if (resto == 10 || resto == 11) resto = 0;

  if (resto != cpf[10]) {
    msg.innerHTML = "<span class='erro'>CPF inválido</span>";
    return;
  }

  msg.innerHTML = "<span class='sucesso'>CPF válido ✔</span>";
}


// 📍 LISTA DINÂMICA DE INSTITUIÇÕES
function mostrarOpcoes() {
  let local = document.getElementById("local").value;
  let select = document.getElementById("instituicoes");

  select.innerHTML = "";

  if (local === "derby") {
    let opcoes = [
      "UNINASSAU, BLOCO A Derby",
      "UNINASSAU, BLOCO B Derby",
      "UNINASSAU, BLOCO C Derby",
      "UNINASSAU, BLOCO D Derby",
      "UNINASSAU, BLOCO E Derby",
      "Estácio Derby",
      "Wyden EAD Derby",
      "Colégio Apoio Derby",
      "Colégio Equipe",
      "Colégio da Polícia Militar"
    ];

    opcoes.forEach(op => {
      let option = document.createElement("option");
      option.text = op;
      select.add(option);
    });

  } else if (local === "camaragibe") {
    let opcoes = [
      "UNINASSAU Camaragibe",
      "Unopar Camaragibe",
      "Anhanguera Camaragibe",
      "Escola Técnica Alcides do Nascimento",
      "Escola Vale das Pedreiras",
      "Escola Abigail Bernardes"
    ];

    opcoes.forEach(op => {
      let option = document.createElement("option");
      option.text = op;
      select.add(option);
    });

  } else {
    let option = document.createElement("option");
    option.text = "Escolha primeiro o local acima";
    select.add(option);
  }
}

</script>

</body>
</html>
