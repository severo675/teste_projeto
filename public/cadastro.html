<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Deca Vagas - Cadastro</title>

<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
  }

  label {
    font-weight: 600;
  }

  input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
    transition: 0.3s;
  }

  input:focus, select:focus {
    border-color: #667eea;
    box-shadow: 0 0 5px #667eea;
    outline: none;
  }

  .btn-salvar {
    width: 100%;
    background: #764ba2;
    color: white;
    border: none;
    padding: 12px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 10px;
  }

  .btn-salvar:hover {
    background: #5c3782;
  }

  .erro { color: red; font-size: 13px; }
  .sucesso { color: green; font-size: 13px; }

</style>
</head>

<body>

<div class="container">
  <h2>Cadastro</h2>

  <label>Nome:</label>
  <input type="text" placeholder="Digite seu nome">

  <label>Número:</label>
  <input type="text" id="telefone" placeholder="(00) 00000-0000" oninput="formatarTelefone(this)">

  <label>CPF:</label>
  <input type="text" id="cpf" placeholder="000.000.000-00" oninput="formatarCPF(this)" onblur="validarCPF()">
  <div id="msgCPF"></div>

  <label>Tipo de estacionamento:</label>
  <select id="tipo" onchange="mostrarCampos()">
    <option value="">Selecione</option>
    <option value="estacionamento">Estacionamento</option>
    <option value="instituicao">Instituição</option>
  </select>

  <div id="divlocal" style="display:none;">
    <label>Localização</label>
    <select id="local" onchange="mostrarOpcoes()">
      <option value="">Selecione</option>
      <option value="derby">Derby</option>
      <option value="camaragibe">Camaragibe</option>
    </select>
</div>

<div id="divDestino" style="display:none;">
  <label id="tituloDestino">Escolha:</label>
  <select id="destino"></select>
</div>

<button class="btn-salvar" onclick="window.location.href='http://localhost:3000'">Salvar Cadastro</button>

<script>

// js

// cpf
function formatarCPF(input) {
  let v = input.value.replace(/\D/g, '');

  v = v.replace(/(\d{3})(\d)/, "$1.$2");
  v = v.replace(/(\d{3})(\d)/, "$1.$2");
  v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");

  input.value = v;
}

// telefone
function formatarTelefone(input) {
  let v = input.value.replace(/\D/g, '');

  v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
  v = v.replace(/(\d{5})(\d)/, "$1-$2");

  input.value = v;
}

// validação do cpf
function validarCPF() {
  let cpf = document.getElementById("cpf").value.replace(/\D/g, '');
  let msg = document.getElementById("msgCPF");

  if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) {
    msg.innerHTML = "<span class='erro'>CPF inválido</span>";
    return;
  }

  let soma = 0, resto;

  for (let i = 1; i <= 9; i++)
    soma += parseInt(cpf.substring(i-1, i)) * (11 - i);

  resto = (soma * 10) % 11;
  if (resto == 10 || resto == 11) resto = 0;

  if (resto != cpf[9]) {
    msg.innerHTML = "<span class='erro'>CPF inválido</span>";
    return;
  }

  soma = 0;
  for (let i = 1; i <= 10; i++)
    soma += parseInt(cpf.substring(i-1, i)) * (12 - i);

  resto = (soma * 10) % 11;
  if (resto == 10 || resto == 11) resto = 0;

  if (resto != cpf[10]) {
    msg.innerHTML = "<span class='erro'>CPF inválido</span>";
    return;
  }

  msg.innerHTML = "<span class='sucesso'>CPF válido ✔</span>";
}


function mostrarCampos() {
  let tipo = document.getElementById("tipo").value;

  if (tipo !== "") {
    document.getElementById("divlocal").style.display = "block";
  }

  else {
    document.getElementById("divlocal").style.display = "none";
    document.getElementById("divDestino").style.display = "none";
  }
}


// 📍 LISTA DINÂMICA DE INSTITUIÇÕES
function mostrarOpcoes() {

  let tipo = document.getElementById("tipo").value;
  let local = document.getElementById("local").value;

  let destino = document.getElementById("destino");
  let titulo = document.getElementById("tituloDestino");



  destino.innerHTML = "";

  if (local === "") {
    document.getElementById("divDestino").style.display = "none";
    return;
  }

  document.getElementById("divDestino").style.display = "block";

  let opcoes = [];

  if (tipo === "instituicao") {

    titulo.innerText = "Escolha a instituição:";

    if (local === "derby") {
      opcoes = [
        "UNINASSAU BLOCO A",
        "UNINASSAU BLOCO B",
        "UNINASSAU BLOCO C",
        "Estácio Derby",
        "Colegio Apoio Derby"
      ];
    }

    if (local === "camaragibe") {
      opcoes = [
        "UNINASSAU CAMARAGIBE",
        "Unopar Camaragibe",
        "Anhanguera Camaragibe"
      ];
    }
  }

  else if (tipo === "estacionamento") {

    titulo.innerText = "Escolha o estacionamento:";

    if (local === "derby") {
      opcoes = [
        "Estacionamento Seu Jorge",
        "Estacionamento Central Do Derby",
        "Estacionamento Shopping Derby"
      ];
    }

    if (local === "camaragibe") {
      opcoes = [
        "Estacionamento Nico Bobo",
        "Estacionamento Maria e José"
      ];
    }
  }

  opcoes.forEach(op => {
    let option = document.createElement("option");
    option.text = op;
    destino.add(option);
  });
}

function salvarNoSupabase() {
  alert("Cadastro salvo com sucesso!");

  window.location.href = "/";
}

</script>
